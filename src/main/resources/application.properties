spring.application.name=notification-poc
server.port=8081

# Kafka Bootstrap
spring.kafka.bootstrap-servers=localhost:9092
# Ne pas crasher le contexte Spring si Kafka n'est pas encore prêt
spring.kafka.admin.fail-fast=false
# Laisser plus de temps à l'admin pour se connecter (en ms)
spring.kafka.admin.operation-timeout=30000

# Kafka Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Consumer (pour les listeners SMS/Email/Push)
spring.kafka.consumer.group-id=notification-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Streams
spring.kafka.streams.application-id=notification-stream-processor
spring.kafka.streams.bootstrap-servers=localhost:9092
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
# Ne pas crasher si un topic source est manquant au démarrage
spring.kafka.streams.properties.topology.optimization=all

# Topics
kafka.topics.raw=raw-notifications
kafka.topics.sms=notifications-sms
kafka.topics.email=notifications-email
kafka.topics.push=notifications-push

# Output files
notification.output.sms=sms_output.txt
notification.output.email=email_output.txt
notification.output.push=push_output.txt
